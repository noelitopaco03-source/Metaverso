<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌍 Metaverso</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <div id="selector">
        <h2>🌟 Elige tu Avatar</h2>
        <input type="text" id="nombre-input" placeholder="✏️ Tu nombre..." maxlength="15">
        <div class="avatar-grid" id="avatar-grid">
            <span class="avatar-opcion" data-avatar="👾">👾</span>
            <span class="avatar-opcion" data-avatar="🤖">🤖</span>
            <span class="avatar-opcion" data-avatar="👽">👽</span>
            <span class="avatar-opcion" data-avatar="🧙">🧙</span>
            <span class="avatar-opcion" data-avatar="🦸">🦸</span>
            <span class="avatar-opcion" data-avatar="🐉">🐉</span>
            <span class="avatar-opcion" data-avatar="🚀">🚀</span>
            <span class="avatar-opcion" data-avatar="👻">👻</span>
            <span class="avatar-opcion" data-avatar="🎃">🎃</span>
            <span class="avatar-opcion" data-avatar="🧝">🧝</span>
            <span class="avatar-opcion" data-avatar="🧞">🧞</span>
            <span class="avatar-opcion" data-avatar="🦄">🦄</span>
            <span class="avatar-opcion" data-avatar="🐱">🐱</span>
            <span class="avatar-opcion" data-avatar="🐺">🐺</span>
            <span class="avatar-opcion" data-avatar="🦊">🦊</span>
        </div>
        <button id="btn-ingresar">🚀 Ingresar</button>
    </div>

    <div id="contador">👥 <span id="num-usuarios">1</span></div>
    
    <div id="info">🎮 WASD para mover</div>

    <!-- CONTROLES MÓVIL -->
    <div id="controles">
        <div class="grupo-botones">
            <button class="btn-control" id="btn-arriba">▲</button>
            <button class="btn-control" id="btn-abajo">▼</button>
        </div>
        <div class="grupo-botones">
            <button class="btn-control" id="btn-izquierda">◀</button>
            <button class="btn-control" id="btn-derecha">▶</button>
        </div>
    </div>

    
    <!-- CHAT CON MODAL -->
    <div id="chat-container">
        <!-- HEADER DEL CHAT -->
        <div class="chat-header">
            <span class="titulo">💬 Chat</span>
            <span style="font-size:12px; color:#888;">👥 <span id="num-usuarios-header">0</span></span>
            <button class="cerrar-chat" id="cerrar-chat-mobile">✕</button>
        </div>
        
        <!-- MENSAJES -->
        <div id="chat-mensajes">
            <div style="color: #888; font-size: 12px; text-align: center; padding: 5px;">💬 Bienvenido al chat</div>
        </div>
        
        <!-- INPUT -->
        <div id="chat-input-container">
            <input type="text" id="chat-input" placeholder="Escribe un mensaje...">
            <button id="chat-enviar">Enviar</button>
        </div>
    </div>

    <!-- BOTÓN FLOTANTE PARA ABRIR CHAT (MÓVIL) -->
    <button class="mobile-chat-toggle" id="mobile-chat-toggle">
        💬
        <span class="badge" id="chat-badge">0</span>
    </button>

   <!-- INVENTARIO ESTILO RPG -->
<div id="inventario-container">
    <div class="item">
        <span class="icono">🪵</span>
        <span>Madera:</span>
        <span class="cantidad" id="madera-cantidad">0</span>
    </div>
    <div class="item">
        <span class="icono">🪨</span>
        <span>Piedra:</span>
        <span class="cantidad" id="piedra-cantidad">0</span>
    </div>
    <div class="item">
        <span class="icono">🟫</span>
        <span>Tierra:</span>
        <span class="cantidad" id="tierra-cantidad">0</span>
    </div>
</div>

    <!-- INFO CONTROLES -->
<div id="info-controles">
    <span>
        🖱️ Click izquierdo: Talar árbol
        <span class="separador">|</span>
        Click derecho: Construir bloque
        <span class="separador">|</span>
        Click medio: Eliminar bloque
    </span>
</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.1/socket.io.min.js"></script>
    <script src="script.js"></script>
    
</body>
</html>
